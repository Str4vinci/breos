name: Tests

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop, "release/**"]
  # Slow endurance/multi-year tests run on a schedule and on demand only.
  schedule:
    - cron: "0 4 * * 1"  # 04:00 UTC every Monday
  workflow_dispatch:

jobs:
  test:
    # The default fast suite runs on pushes and PRs (including release/**),
    # not on the scheduled/dispatch slow runs.
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]

    env:
      UV_PYTHON: ${{ matrix.python-version }}

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --extra dev --extra docs

      - name: Lint
        run: uv run ruff check breos/ tests/ tools/

      - name: Check formatting
        run: uv run ruff format --check breos/ tests/ tools/

      - name: Run tests
        # Slow tests are deselected by default (pyproject addopts: -m "not slow").
        run: uv run pytest tests/ -v

      - name: Verify release artifacts
        run: uv run python tools/verify_release_artifacts.py

      - name: Build docs
        run: uv run --extra docs sphinx-build -b html docs docs/_build/html

  slow-tests:
    # Long-running endurance and multi-year integration tests on Python 3.12.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    env:
      UV_PYTHON: "3.12"

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run slow tests
        run: uv run pytest tests/ -m slow -v
