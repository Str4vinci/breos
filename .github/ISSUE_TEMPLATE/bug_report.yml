name: Bug Report
description: Report a bug in BREOS
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal code or steps to reproduce the issue
      render: python
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, OS, BREOS version
      placeholder: |
        Python: 3.13
        OS: Ubuntu 24.04
        BREOS: 0.2.0
    validations:
      required: true
